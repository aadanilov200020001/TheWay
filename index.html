<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <title>Мой комикс</title>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      color: #fff;
      overflow: hidden;
    }
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: center;
      width: 100%;
    }
    img {
      max-width: 95vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    #info {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #pageInput {
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      padding: 4px 8px;
      font-size: 14px;
      width: 50px;
      text-align: center;
      cursor: pointer;
    }
    #pageInput:focus {
      outline: none;
      border-color: #4a90e2;
      background: #333;
    }
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(74, 144, 226, 0.8);
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 24px;
      cursor: pointer;
      border-radius: 8px;
      z-index: 10;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: rgba(74, 144, 226, 1); }
    .nav-btn:disabled { background: rgba(100, 100, 100, 0.5); cursor: not-allowed; }
    #prevBtn { left: 10px; }
    #nextBtn { right: 10px; }
    #loader {
      position: fixed;
      color: #888;
      font-size: 14px;
      bottom: 50px;
    }
    
    /* Кнопка полноэкранного режима */
    #fullscreenBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(74, 144, 226, 0.9);
      color: white;
      border: none;
      padding: 12px 16px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
      z-index: 100;
      transition: background 0.2s;
    }
    #fullscreenBtn:hover { background: rgba(74, 144, 226, 1); }
    
    /* Скрываем кнопки на мобильных устройствах */
    @media (max-width: 768px) {
      .nav-btn {
        display: none;
      }
    }
    
    /* Полноэкранный режим */
    .fullscreen-mode #container {
      background: #111;
    }
    .fullscreen-mode img {
      max-width: 100vw;
      max-height: 100vh;
      border-radius: 0;
    }
    .fullscreen-mode #info,
    .fullscreen-mode #loader,
    .fullscreen-mode #fullscreenBtn,
    .fullscreen-mode #pageInput {
      display: none !important;
    }
    .fullscreen-mode .nav-btn {
      display: none !important;
    }
    
    /* Подсказка для выхода из полноэкранного режима */
    #fullscreenHint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 15px 25px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      display: none;
      pointer-events: none;
      text-align: center;
    }
    .fullscreen-mode #fullscreenHint.show {
      display: block;
      animation: fadeOut 2s forwards;
      animation-delay: 1s;
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }
    
    /* Модальное окно для перехода */
    #jumpModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    #jumpModal.show {
      display: flex;
    }
    .jump-box {
      background: #222;
      padding: 20px 25px;
      border-radius: 12px;
      text-align: center;
      max-width: 90%;
      width: 300px;
    }
    .jump-box h3 {
      margin: 0 0 15px;
      font-size: 16px;
      color: #fff;
    }
    .jump-input {
      width: 100%;
      padding: 10px;
      font-size: 18px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #333;
      color: #fff;
      text-align: center;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    .jump-input:focus {
      outline: none;
      border-color: #4a90e2;
    }
    .jump-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .jump-btn {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }
    .jump-btn.go {
      background: #4a90e2;
      color: white;
    }
    .jump-btn.cancel {
      background: #444;
      color: white;
    }
    .jump-btn:hover { opacity: 0.9; }
    .jump-error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
    .jump-error.show {
      display: block;
    }
  </style>
</head>
<body>

<div id="container">
  <img id="page" alt="Страница комикса">
  <div id="info">
    Страница 
    <input type="number" id="pageInput" min="0" max="208" value="0" title="Введите номер страницы">
    из <span id="total">209</span>
    <span id="jumpHint" style="font-size: 11px; color: #666; cursor: pointer;" title="Нажмите для перехода">↗</span>
  </div>
</div>
<div id="loader">Загрузка...</div>

<button id="prevBtn" class="nav-btn">←</button>
<button id="nextBtn" class="nav-btn">→</button>
<button id="fullscreenBtn" title="На весь экран">⛶</button>

<div id="fullscreenHint">Свайп вверх для выхода</div>

<!-- Модальное окно для перехода -->
<div id="jumpModal">
  <div class="jump-box">
    <h3>Перейти к странице</h3>
    <input type="number" id="jumpInput" class="jump-input" min="0" max="208" placeholder="0–208">
    <div id="jumpError" class="jump-error">Введите число от 0 до 208</div>
    <div class="jump-buttons">
      <button class="jump-btn cancel" id="jumpCancel">Отмена</button>
      <button class="jump-btn go" id="jumpGo">Перейти</button>
    </div>
  </div>
</div>

<script>
// === НАСТРОЙКИ ===
const TOTAL_PAGES = 209;
const FOLDER = "pages/";
const EXT = ".webp";
// =================

let currentPage = 0;
let isFullscreen = false;
const img = document.getElementById("page");
const currentSpan = document.getElementById("current");
const totalSpan = document.getElementById("total");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const loader = document.getElementById("loader");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const fullscreenHint = document.getElementById("fullscreenHint");
const container = document.getElementById("container");
const pageInput = document.getElementById("pageInput");
const jumpModal = document.getElementById("jumpModal");
const jumpInput = document.getElementById("jumpInput");
const jumpGo = document.getElementById("jumpGo");
const jumpCancel = document.getElementById("jumpCancel");
const jumpError = document.getElementById("jumpError");
const jumpHint = document.getElementById("jumpHint");

totalSpan.textContent = TOTAL_PAGES;
pageInput.max = TOTAL_PAGES - 1;
jumpInput.max = TOTAL_PAGES - 1;

function pageName(num) {
  return String(num);
}

function showPage() {
  loader.style.display = "block";
  img.style.opacity = "0.5";
  img.src = FOLDER + pageName(currentPage) + EXT;
  pageInput.value = currentPage;
  
  prevBtn.disabled = (currentPage === 0);
  nextBtn.disabled = (currentPage === TOTAL_PAGES - 1);
}

function nextPage() {
  if (currentPage < TOTAL_PAGES - 1) {
    currentPage++;
    showPage();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    showPage();
  }
}

// === ПЕРЕХОД К СТРАНИЦЕ ===

function openJumpModal() {
  jumpInput.value = currentPage;
  jumpError.classList.remove("show");
  jumpModal.classList.add("show");
  setTimeout(() => jumpInput.focus(), 100);
}

function closeJumpModal() {
  jumpModal.classList.remove("show");
}

function goToPage() {
  const value = parseInt(jumpInput.value, 10);
  
  if (isNaN(value) || value < 0 || value >= TOTAL_PAGES) {
    jumpError.classList.add("show");
    jumpInput.focus();
    return;
  }
  
  currentPage = value;
  showPage();
  closeJumpModal();
}

// Обработчики для модального окна
jumpHint.addEventListener("click", (e) => {
  e.stopPropagation();
  openJumpModal();
});

pageInput.addEventListener("click", (e) => {
  e.stopPropagation();
  openJumpModal();
});

pageInput.addEventListener("change", (e) => {
  const value = parseInt(e.target.value, 10);
  if (!isNaN(value) && value >= 0 && value < TOTAL_PAGES) {
    currentPage = value;
    showPage();
  } else {
    e.target.value = currentPage;
  }
});

jumpGo.addEventListener("click", (e) => {
  e.stopPropagation();
  goToPage();
});

jumpCancel.addEventListener("click", (e) => {
  e.stopPropagation();
  closeJumpModal();
});

jumpInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    goToPage();
  }
  if (e.key === "Escape") {
    closeJumpModal();
  }
});

jumpModal.addEventListener("click", (e) => {
  if (e.target === jumpModal) {
    closeJumpModal();
  }
});

// === ПОЛНОЭКРАННЫЙ РЕЖИМ ===

function enterFullscreen() {
  if (!isFullscreen) {
    isFullscreen = true;
    document.body.classList.add("fullscreen-mode");
    
    fullscreenHint.classList.remove("show");
    void fullscreenHint.offsetWidth;
    fullscreenHint.classList.add("show");
    
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else if (document.documentElement.webkitRequestFullscreen) {
      document.documentElement.webkitRequestFullscreen();
    }
  }
}

function exitFullscreen() {
  if (isFullscreen) {
    isFullscreen = false;
    document.body.classList.remove("fullscreen-mode");
    
    if (document.exitFullscreen) {
      document.exitFullscreen().catch(() => {});
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
  }
}

function toggleFullscreen() {
  if (isFullscreen) {
    exitFullscreen();
  } else {
    enterFullscreen();
  }
}

img.addEventListener("load", () => {
  loader.style.display = "none";
  img.style.opacity = "1";
  
  if (currentPage < TOTAL_PAGES - 1) {
    const preload = new Image();
    preload.src = FOLDER + pageName(currentPage + 1) + EXT;
  }
});

// Клик по экрану
document.body.addEventListener("click", (e) => {
  if (e.target.classList.contains("nav-btn") || 
      e.target.id === "fullscreenBtn" ||
      e.target.id === "jumpModal" ||
      e.target.closest(".jump-box")) {
    return;
  }
  
  if (isFullscreen) return;
  
  if (e.clientX > window.innerWidth / 2) {
    nextPage();
  } else {
    prevPage();
  }
});

// Кнопки навигации
prevBtn.addEventListener("click", prevPage);
nextBtn.addEventListener("click", nextPage);

// Кнопка полноэкранного режима
fullscreenBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  toggleFullscreen();
});

// Клавиатура
document.addEventListener("keydown", (e) => {
  if (jumpModal.classList.contains("show")) return;
  
  if (e.key === "ArrowRight" || e.key === " " || e.key === "Enter") nextPage();
  if (e.key === "ArrowLeft") prevPage();
  if (e.key === "Escape" && isFullscreen) exitFullscreen();
  if (e.key === "f" || e.key === "F") toggleFullscreen();
  if (e.key === "g" || e.key === "G") openJumpModal(); // G = Go to page
});

// Свайпы
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener("touchstart", (e) => {
  if (jumpModal.classList.contains("show")) return;
  
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, {passive: true});

document.addEventListener("touchend", (e) => {
  if (jumpModal.classList.contains("show")) return;
  
  const touchEndX = e.changedTouches[0].screenX;
  const touchEndY = e.changedTouches[0].screenY;
  
  const diffX = touchStartX - touchEndX;
  const diffY = touchStartY - touchEndY;
  
  if (isFullscreen) {
    if (diffY > 100 && Math.abs(diffY) > Math.abs(diffX)) {
      exitFullscreen();
      return;
    }
    if (diffX > 50 && Math.abs(diffX) > Math.abs(diffY)) {
      nextPage();
      return;
    }
    if (diffX < -50 && Math.abs(diffX) > Math.abs(diffY)) {
      prevPage();
      return;
    }
  } else {
    if (diffX > 50) {
      nextPage();
    } else if (diffX < -50) {
      prevPage();
    }
  }
}, {passive: true});

// Отслеживание выхода из fullscreen
document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement && isFullscreen) {
    exitFullscreen();
  }
});

// Инициализация
showPage();
</script>

</body>
</html>
