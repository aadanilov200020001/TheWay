<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Путь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЭКРАН ОБЛОЖКИ -->
    <div id="cover-screen">
        <img src="images/start.jpg" alt="Cover" id="cover-image">
    </div>

    <!-- ЭКРАН ЧИТАЛКИ (скрыт по умолчанию) -->
    <div id="reader-screen" style="display: none;">
        <img id="page-img" src="" alt="Page">

        <div id="ui-controls">
            <button id="btn-goto" title="Перейти на страницу">#</button>
            <div id="page-indicator">1 / 248</div>
            <button id="btn-fullscreen" title="Полноэкранный режим">⛶</button>
        </div>

        <div id="goto-input-container" style="display: none;">
            <input type="number" id="goto-input" min="1" max="247" placeholder="№ страницы">
        </div>
    </div>

    <!-- ЭКРАН ОБРАТНОЙ СВЯЗИ (скрыт по умолчанию) -->
    <div id="feedback-screen" style="display: none;">
        <div class="feedback-content">
            <h2>Конец</h2>
            <p class="feedback-text">
              Проект находится  в процессе доработки, <br>
                потому буду рад вашей обратной связи, мыслям и критике. <br>
                Сейчас я живу в Казани и готов к живому взаимодействию.
            </p>
            <div class="feedback-links">
                <a href="https://t.me/no1nameman1on" target="_blank" class="feedback-link">Telegram</a>
                <a href="https://vk.com/id578550481" target="_blank" class="feedback-link">ВКонтакте</a>
            </div>
            <button id="btn-restart" class="feedback-btn">Начать сначала</button>
            <button id="btn-close-feedback" class="feedback-btn">Вернуться к чтению</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
