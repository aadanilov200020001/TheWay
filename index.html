<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПУТЬ - Ридер</title>
    <!-- Путь к CSS должен быть просто style.css, если он лежит рядом с index.html -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <!-- Стартовый экран -->
    <div id="start-screen">
        <div class="start-image" onclick="startReading()">
            <!-- Путь к картинке: images/start.jpg -->
            <img src="images/start.jpg" alt="ПУТЬ">
        </div>
    </div>

    <!-- Экран чтения -->
    <div id="reader-screen" class="hidden">
        ... (остальной код) ...
    </div>

    <!-- Путь к JS должен быть просто script.js, если он лежит рядом с index.html -->
    <script src="script.js"></script>
</body>
</html>
