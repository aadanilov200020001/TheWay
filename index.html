<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Путь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЭКРАН ОБЛОЖКИ -->
    <div id="cover-screen">
        <img src="images/start.jpg" alt="Cover" id="cover-image">
    </div>

    <!-- ЭКРАН ЧИТАЛКИ (скрыт по умолчанию) -->
    <div id="reader-screen" style="display: none;">
        
        <!-- Изображение страницы -->
        <img id="page-img" src="" alt="Page">

        <!-- Интерфейс (нижняя панель) -->
        <div id="ui-controls">
            <button id="btn-goto" title="Перейти на страницу">#</button>
            <div id="page-indicator">1 / 247</div>
            <button id="btn-fullscreen" title="Полноэкранный режим">⛶</button>
        </div>

        <!-- Скрытое поле ввода для перехода -->
        <div id="goto-input-container" style="display: none;">
            <input type="number" id="goto-input" min="1" max="247" placeholder="№ страницы">
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
